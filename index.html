<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murilo Designer</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Arial;
}

/* ANIMAÇÃO */
.reveal {
    opacity: 0;
    transform: translateY(50px);
    transition: 0.6s;
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* HEADER */
header {
    text-align: center;
    padding: 80px 20px;
}

h1 {
    font-size: 45px;
}

p {
    color: #aaa;
}

/* BOTÃO INSTAGRAM */
.links a {
    display: inline-block;
    margin-top: 20px;
    color: #00ff88;
    text-decoration: none;
    border: 1px solid #00ff88;
    padding: 12px 25px;
    border-radius: 10px;
    transition: 0.3s;
}

.links a:hover {
    background: #00ff88;
    color: black;
}

/* SOBRE */
.sobre {
    text-align: center;
    padding: 20px;
}

/* GRID */
.trabalhos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

/* CARD */
.card {
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 0 25px #00ff88;
}

.card img {
    width: 100%;
    height: auto;
    display: block;
}

/* LIGHTBOX (IMAGEM GRANDE) */
.lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
}

.lightbox.active {
    display: flex;
}

/* BOTÃO WHATS */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 22px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 0 20px rgba(0,255,100,0.6);
}

/* RESPONSIVO */
@media (max-width: 600px) {
    h1 { font-size: 30px; }
}
</style>
</head>

<body>

<header class="reveal">
    <h1>Murilo Designer</h1>
    <p>Design que chama atenção e gera resultado 🚀</p>

    <div class="links">
        <a href="https://www.instagram.com/mv.designbr/" target="_blank">
            Ver Instagram
        </a>
    </div>
</header>

<section class="sobre reveal">
    <p>
        Eu ajudo empresas e criadores a crescer no Instagram com posts profissionais e criativos.
    </p>
</section>

<section class="trabalhos">

    <div class="card reveal" onclick="abrir(this)">
        <img src="imagens/foto1.jpeg">
    </div>

    <div class="card reveal" onclick="abrir(this)">
        <img src="imagens/foto2.jpeg">
    </div>

    <div class="card reveal" onclick="abrir(this)">
        <img src="imagens/foto3.jpeg">
    </div>

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="fechar()">
    <img id="imgGrande">
</div>

<a class="whatsapp" href="https://wa.me/5511911436847" target="_blank">
    Fale comigo
</a>

<script>
/* ANIMAÇÃO AO ROLAR */
window.addEventListener("scroll", () => {
    document.querySelectorAll(".reveal").forEach(el => {
        let top = el.getBoundingClientRect().top;
        if (top < window.innerHeight - 100) {
            el.classList.add("active");
        }
    });
});

/* LIGHTBOX */
function abrir(el) {
    document.getElementById("lightbox").classList.add("active");
    document.getElementById("imgGrande").src = el.querySelector("img").src;
}

function fechar() {
    document.getElementById("lightbox").classList.remove("active");
}
</script>

</body>
</html>
