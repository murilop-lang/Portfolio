<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murilo Designer</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Arial;
}

/* HEADER */
header {
    text-align: center;
    padding: 60px 20px;
}

h1 {
    font-size: 42px;
    margin: 0;
}

p {
    color: #aaa;
}

/* BOTÃO INSTAGRAM */
.links a {
    display: inline-block;
    margin-top: 15px;
    color: #00ff88;
    text-decoration: none;
    border: 1px solid #00ff88;
    padding: 10px 20px;
    border-radius: 8px;
    transition: 0.3s;
}

.links a:hover {
    background: #00ff88;
    color: black;
}

/* SOBRE */
.sobre {
    text-align: center;
    padding: 20px;
}

/* TRABALHOS */
.trabalhos {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    padding: 20px;
}

.card {
    overflow: hidden;
    border-radius: 12px;
    margin: 10px;
}

.card img {
    width: 280px;
    transition: 0.4s;
}

.card img:hover {
    transform: scale(1.08);
    filter: brightness(1.1);
}

/* BOTÃO WHATSAPP FLUTUANTE */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(0,255,100,0.5);
    transition: 0.3s;
}

.whatsapp:hover {
    transform: scale(1.1);
}

/* RESPONSIVO */
@media (max-width: 600px) {
    h1 {
        font-size: 30px;
    }

    .card img {
        width: 90%;
    }
}
</style>
</head>

<body>

<header>
    <h1>Murilo Designer</h1>
    <p>Design que chama atenção e gera resultado 🚀</p>

    <div class="links">
        <a href="https://www.instagram.com/mv.designbr/" target="_blank">
            Ver Instagram
        </a>
    </div>
</header>

<section class="sobre">
    <p>
        Eu ajudo empresas e criadores a crescer no Instagram com posts profissionais e criativos.
    </p>
</section>

<section class="trabalhos">
    <div class="card">
        <img src="imagens/foto1.jpeg">
    </div>

    <div class="card">
        <img src="imagens/foto2.jpeg">
    </div>

    <div class="card">
        <img src="imagens/foto3.jpeg">
    </div>
</section>

<a class="whatsapp" href="https://wa.me/5511911436847" target="_blank">
    Fale comigo
</a>

</body>
</html>
